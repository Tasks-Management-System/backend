name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. CI ──────────────────────────────────────────────────────────────────
  ci:
    name: Install, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          missing=""
          [ -z "$MONGODB_URI" ]           && missing="$missing MONGODB_URI"
          [ -z "$JWT_SECRET" ]            && missing="$missing JWT_SECRET"
          [ -z "$GOOGLE_CLIENT_ID" ]      && missing="$missing GOOGLE_CLIENT_ID"
          [ -z "$GOOGLE_CLIENT_SECRET" ]  && missing="$missing GOOGLE_CLIENT_SECRET"
          [ -z "$CLOUDINARY_CLOUD_NAME" ] && missing="$missing CLOUDINARY_CLOUD_NAME"
          [ -z "$SENDGRID_API_KEY" ]      && missing="$missing SENDGRID_API_KEY"
          [ -z "$REDIS_URL" ]             && missing="$missing REDIS_URL"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub secrets:$missing"
            echo "Go to Settings → Secrets and variables → Actions and add the missing secrets."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # ─── 2. Docker build & push ─────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tasks-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tasks-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Deploy to Render ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered successfully."
